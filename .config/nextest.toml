[profile.default]
# Fail any individual test that takes longer than 20 seconds.
slow-timeout = { period = "20s", terminate-after = 1 }

# NOTE: nextest applies the FIRST matching override for a given setting.
# The most specific overrides must therefore come BEFORE the broad
# `/^script_/` rule below, or they will be shadowed by it.

# `D[x^x, {x, 10}]` is intentionally a heavy regression test for the Plus
# comparator panic — order 10 matches the originally panicking input. It
# takes ~10s standalone in debug builds and can brush against the default
# 20s timeout under full parallel load. Give it a wider window.
[[profile.default.overrides]]
filter = 'test(high_order_derivative_of_x_x_does_not_panic)'
slow-timeout = { period = "60s", terminate-after = 1 }

# The remaining (non-`#[ignore]`d) RosettaCode script snapshots run a few
# seconds in debug builds; under full parallel load they can brush past the
# default 20s timeout. Give them a safety ceiling. The genuinely heavy
# scripts (tens of seconds each in debug) are marked `#[ignore]` via the
# `slow_script_test!` macro and run only via `make test-slow` under the
# `slow` profile below — they never run during `make test`.
[[profile.default.overrides]]
filter = 'test(/^script_/)'
slow-timeout = { period = "120s", terminate-after = 1 }

# Profile for `make test-slow` (`cargo nextest run --profile slow
# --run-ignored only`). The heavy `#[ignore]`d scripts run with heavy
# mutual CPU contention and are ~270s+ standalone in debug builds, so give
# every test a very wide window.
#
# NOTE: a custom profile inherits `[[profile.default.overrides]]`, and the
# active profile's own overrides are evaluated *before* the inherited ones.
# Without the explicit `script_` override below, the default profile's
# 120s `/^script_/` rule would shadow this profile's 900s base and the
# heavy scripts would (wrongly) time out at 120s.
[profile.slow]
slow-timeout = { period = "900s", terminate-after = 1 }

[[profile.slow.overrides]]
filter = 'test(/^script_/)'
slow-timeout = { period = "900s", terminate-after = 1 }
