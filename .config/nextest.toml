[profile.default]
# Fail any individual test that takes longer than 20 seconds.
slow-timeout = { period = "20s", terminate-after = 1 }

# Some script_snapshot_tests run heavy RosettaCode programs that take
# tens of seconds in debug builds. Give them a generous budget.
[[profile.default.overrides]]
filter = 'test(/^script_/)'
slow-timeout = { period = "180s", terminate-after = 1 }

# `D[x^x, {x, 10}]` is intentionally a heavy regression test for the Plus
# comparator panic — order 10 matches the originally panicking input. It
# takes ~10s standalone in debug builds and can brush against the default
# 20s timeout under full parallel load. Give it a wider window.
[[profile.default.overrides]]
filter = 'test(high_order_derivative_of_x_x_does_not_panic)'
slow-timeout = { period = "60s", terminate-after = 1 }
