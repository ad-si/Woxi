name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast correctness suite — mirrors `make test`. The ~24 heavy script
  # snapshots are `#[ignore]`d (see `slow_script_test!`) and run in the
  # `test-slow` job below instead.
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: taiki-e/install-action@nextest
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: make test

  # Correctness of the heavy `#[ignore]`d scripts — mirrors `make
  # test-slow`. Runs in parallel with the fast suite so it never blocks
  # quick feedback. Performance of these is tracked by the benchmarks.
  test-slow:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: taiki-e/install-action@nextest
    - name: Run slow script tests
      run: make test-slow
