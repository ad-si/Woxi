name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast correctness suite — mirrors `make test`. The ~24 heavy script
  # snapshots are `#[ignore]`d (see `slow_script_test!`) and run in the
  # nightly workflow (nightly.yml) instead.
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: taiki-e/install-action@nextest
    - name: Run tests
      run: make test
