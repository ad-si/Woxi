# Build Python wheels for the woxi package (woxi-py) and publish them
# to PyPI.
#
# Wheels + sdist are built on every push to main and for version tags /
# manual runs, so breakage surfaces early. Publishing only happens for
# tags starting with "v" (e.g. v0.2.0) or manual workflow dispatch.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token needed.
# One-time setup on pypi.org: project "woxi" → Settings → Publishing →
# add GitHub publisher (owner: ad-si, repository: Woxi,
# workflow: publish-pypi.yml, environment: pypi).
name: Publish to PyPI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "woxi-py/**"
      - ".github/workflows/publish-pypi.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: woxi-py
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: woxi-py/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          # Each runner builds for its native architecture. No explicit
          # `target:` — passing one makes maturin-action configure Apple
          # cross-linking with `-fuse-ld=lld`, which the runners' clang
          # does not ship ("invalid linker name in argument '-fuse-ld=lld'").
          - runner: macos-13 # x86_64
            arch: x86_64
          - runner: macos-latest # arm64
            arch: aarch64
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: woxi-py
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.arch }}
          path: woxi-py/dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: woxi-py
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: woxi-py/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: woxi-py
          command: sdist
          args: --out dist
      - name: Verify the sdist builds standalone
        # Dev profile: this only checks that the sdist is complete and
        # compiles; the release-profile wheels are built in the other jobs.
        env:
          MATURIN_PEP517_ARGS: --profile dev
        run: |
          python3 -m venv venv
          venv/bin/pip install woxi-py/dist/woxi-*.tar.gz
          venv/bin/python -c "import woxi; assert woxi.interpret('Plus[1, 2]') == '3'"
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: woxi-py/dist

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
