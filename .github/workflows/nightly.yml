name: Nightly

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Correctness of all tests gated behind the `slow-tests` cargo feature —
  # the ~24 heavy script snapshots (see `slow_script_test!`; too slow for
  # every push/PR) and the wikidata tests that query the live wikidata.org
  # API (excluded from the offline suite). Runs once per night via
  # `make test-slow`. Performance of the heavy scripts is tracked by the
  # benchmarks.
  test-slow:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: Run slow and network tests
      run: make test-slow

  # Windows builds of the interpreter CLI and the Studio notebook editor,
  # plus the full unit test suite. Neither the build nor the tests are
  # covered by the Linux-only CI, so this catches Windows-specific build
  # breakage and test failures while also providing downloadable binaries.
  # The `slow-tests` suite runs on Linux in the `test-slow` job above; the
  # wolframscript/scrut conformance tests need tools unavailable here.
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: Build woxi and woxi-studio
      run: cargo build --release -p woxi -p woxi-studio
    - name: Upload woxi binary
      uses: actions/upload-artifact@v6
      with:
        name: woxi-windows-x86_64
        path: target/release/woxi.exe
        if-no-files-found: error
    - name: Upload woxi-studio binary
      uses: actions/upload-artifact@v6
      with:
        name: woxi-studio-windows-x86_64
        path: target/release/woxi-studio.exe
        if-no-files-found: error
    # Mirrors `make test` (the fast correctness suite the Linux CI runs),
    # invoked directly since `make` is not available on the Windows runner.
    - name: Run unit tests
      run: cargo nextest run --show-progress=none --status-level=fail --failure-output=final

  # Coverage-guided crash fuzzing of the parser and interpreter (see
  # fuzz/README.md). A few minutes per target per night compounds into
  # deep coverage over time; crashing inputs are uploaded as artifacts.
  fuzz:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@nightly
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          fuzz
    - uses: taiki-e/install-action@v2
      with:
        tool: cargo-fuzz
    - name: Seed corpora from the test scripts
      run: make fuzz-corpus
    # The prebuilt cargo-fuzz binary is a static musl build and defaults to
    # its own compile-time triple (x86_64-unknown-linux-musl), which cannot
    # link ASan ("sanitizer is incompatible with statically linked libc").
    # Pass the host triple explicitly so the fuzz targets build against glibc.
    - name: Determine host target triple
      run: |
        echo "HOST_TARGET=$(rustc -vV | sed -n 's/host: //p')" >> "$GITHUB_ENV"
    - name: Fuzz the parser
      run: cargo fuzz run parse --target "$HOST_TARGET" -- -timeout=10 -max_len=4096 -max_total_time=300
    - name: Fuzz the interpreter
      # Runs even when the parse target already found a crash, so one
      # night reports both.
      if: '!cancelled()'
      # -rss_limit_mb is raised above the 2048 default because some corpus
      # seeds (tests/scripts/*.wls) are legitimately memory-hungry
      # computations, and ASan roughly triples their footprint.
      # -timeout=60 (not the 20 the parse target uses) because seeds and
      # mutants can be heavy-but-terminating computations under ASan;
      # true infinite loops are still caught.
      run: cargo fuzz run interpret --target "$HOST_TARGET" -- -timeout=60 -max_len=2048 -max_total_time=300 -rss_limit_mb=8192
    - name: Upload crashing inputs
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: fuzz-artifacts
        path: fuzz/artifacts/
