<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woxi Playground</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="status" id="status"></div>

  <header>
    <h1>Woxi Playground</h1>
    <nav>
      <a href="/docs/">Documentation &#8594;</a>
      <button id="themeBtn" aria-label="Toggle theme"></button>
    </nav>
  </header>

  <main>
    <section class="editor-pane">
      <div class="editor-container" id="editor"></div>
      <div class="controls">
        <button id="clearBtn">Clear</button>
        <div class="controls-right">
          <button id="shareBtn">Share</button>
          <button id="runBtn" disabled data-tooltip="Run code (&#8679; + Enter)">
            Run
            <div class="spinner" id="runSpinner"></div>
          </button>
        </div>
      </div>
    </section>
    <section class="output-pane">
      <div id="outputs"></div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>

</html>
